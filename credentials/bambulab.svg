<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <!-- Printer body -->
  <rect x="8" y="22" width="44" height="30" rx="3" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Print bed -->
  <rect x="13" y="38" width="34" height="4" rx="1" fill="#00d4ff" opacity="0.6"/>
  <!-- Gantry bar -->
  <rect x="10" y="20" width="40" height="4" rx="2" fill="#00d4ff" opacity="0.8"/>
  <!-- Print head -->
  <rect x="26" y="20" width="8" height="10" rx="1" fill="#ffffff" opacity="0.9"/>
  <circle cx="30" cy="32" r="1.5" fill="#ff6b35"/>
  <!-- Top frame -->
  <path d="M14 20 L22 8 L38 8 L46 20" stroke="#00d4ff" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <!-- Filament lines -->
  <line x1="30" y1="8" x2="30" y2="20" stroke="#00d4ff" stroke-width="1" stroke-dasharray="2,2"/>
</svg>
